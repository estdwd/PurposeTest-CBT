<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>PurposeTest - Science Exam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .exam-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .exam-header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .exam-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer {
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }

        /* Question Area */
        .question-section {
            flex: 1;
            overflow-y: auto;
            padding: 25px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .question-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
        }

        .subject-badge {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .question-number {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .question-text {
            color: white;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .passage-box {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid rgba(59, 130, 246, 0.6);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .passage-title {
            color: rgba(255, 255, 255, 0.95);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .passage-text {
            color: rgba(255, 255, 255, 0.95);
            font-size: 15px;
            line-height: 1.8;
            font-style: italic;
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 12px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .option-item.selected {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .option-item:active {
            transform: scale(0.99);
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .nav-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-previous {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .btn-next {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .btn-submit {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .nav-btn:active {
            transform: scale(0.98);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Question Navigator */
        .question-navigator {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
        }

        .nav-title {
            color: white;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 8px;
        }

        .q-number {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .q-number.answered {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .q-number.current {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .q-number:active {
            transform: scale(0.95);
        }

        /* Calculator Button */
        .calc-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
            cursor: pointer;
            z-index: 1000;
            transition: all 0.2s ease;
        }

        .calc-btn:active {
            transform: scale(0.95);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .exam-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .exam-info {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
            }

            .question-section {
                padding: 15px;
            }

            .question-container {
                padding: 20px;
            }

            .question-text {
                font-size: 16px;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            }

            .q-number {
                width: 40px;
                height: 40px;
                font-size: 13px;
            }

            .calc-btn {
                width: 55px;
                height: 55px;
                bottom: 15px;
                right: 15px;
            }
        }
    </style>

                    <div class="question-grid" id="questionGrid">

            </div>
        </div>
    </div>

        // NEW DISTRIBUTION FUNCTION - Uses specific question counts
        function distributeQuestions(subjects, questionCounts) {
            let allQuestions = [];
            
            subjects.forEach(subject => {
                const subjectQuestions = questionBank[subject];
                const questionsNeeded = questionCounts[subject];
                let subjectSelectedQuestions = [];
                
                if (subject === "English") {
                    // Handle English with passages
                    const passages = subjectQuestions.filter(q => q.type === "passage");
                    const regularQuestions = subjectQuestions.filter(q => !q.type);
                    
                    // Add all passage questions first (10 questions from 2 passages)
                    passages.forEach(passage => {
                        passage.questions.forEach(q => {
                            subjectSelectedQuestions.push({
                                subject: subject,
                                passage: passage.passage,
                                ...q
                            });
                        });
                    });
                    
                    // If we need more questions (60 total - 10 from passages = 50 more needed)
                    const remaining = questionsNeeded - subjectSelectedQuestions.length;
                    if (remaining > 0) {
                        const shuffled = [...regularQuestions].sort(() => 0.5 - Math.random());
                        for (let i = 0; i < Math.min(remaining, shuffled.length); i++) {
                            subjectSelectedQuestions.push({
                                subject: subject,
                                ...shuffled[i]
                            });
                        }
                    }
                    
                    // Take exactly questionsNeeded
                    allQuestions.push(...subjectSelectedQuestions.slice(0, questionsNeeded));
                    
                } else {
                    // For other subjects (40 questions each)
                    const shuffled = [...subjectQuestions].sort(() => 0.5 - Math.random());
                    const selected = shuffled.slice(0, questionsNeeded);
                    
                    selected.forEach(q => {
                        allQuestions.push({
                            subject: subject,
                            ...q
                        });
                    });
                }
            });
            
            return allQuestions;
        }

        // Initialize exam with new distribution
        let questions = distributeQuestions(examConfig.subjects, examConfig.questionCounts);
        let currentQuestionIndex = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let timeRemaining = examConfig.timeLimit * 60;

        document.getElementById('totalQuestions').textContent = questions.length;

        // Display question
        function displayQuestion() {
            const q = questions[currentQuestionIndex];
            
            document.getElementById('currentSubject').textContent = q.subject;
            document.getElementById('questionNumber').textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            
            if (q.passage) {
                document.getElementById('passageContainer').style.display = 'block';
                document.getElementById('passageText').textContent = q.passage;
            } else {
                document.getElementById('passageContainer').style.display = 'none';
            }
            
            document.getElementById('questionText').textContent = q.question;
            
            const optionsList = document.getElementById('optionsList');
            optionsList.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const li = document.createElement('li');
                li.className = 'option-item';
                if (userAnswers[currentQuestionIndex] === index) {
                    li.classList.add('selected');
                }
                li.textContent = option;
                li.onclick = () => selectOption(index);
                optionsList.appendChild(li);
            });
            
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === questions.length - 1) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'block';
            } else {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('submitBtn').style.display = 'none';
            }
            
            updateQuestionGrid();
        }

        function selectOption(index) {
            userAnswers[currentQuestionIndex] = index;
            displayQuestion();
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            }
        }

        function jumpToQuestion(index) {
            currentQuestionIndex = index;
            displayQuestion();
        }

        function updateQuestionGrid() {
            const grid = document.getElementById('questionGrid');
            grid.innerHTML = '';
            
            questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'q-number';
                div.textContent = index + 1;
                
                if (userAnswers[index] !== null) {
                    div.classList.add('answered');
                }
                if (index === currentQuestionIndex) {
                    div.classList.add('current');
                }
                
                div.onclick = () => jumpToQuestion(index);
                grid.appendChild(div);
            });
        }

        function startTimer() {
            const timerInterval = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                    return;
                }
                
                timeRemaining--;
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                document.getElementById('timeDisplay').textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }

        function submitExam() {
            let correct = 0;
            questions.forEach((q, index) => {
                if (userAnswers[index] === q.answer) {
                    correct++;
                }
            });
            
            const score = Math.round((correct / questions.length) * 100);
            
            const result = {
                username: username,
                subjects: examConfig.subjects.join(', '),
                totalQuestions: questions.length,
                correctAnswers: correct,
                score: score,
                date: new Date().toLocaleString()
            };
            
            localStorage.setItem('lastExamResult', JSON.stringify(result));
            localStorage.setItem('examQuestions', JSON.stringify(questions));
            localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
            
            const stats = JSON.parse(localStorage.getItem('userStats')) || {
                totalExams: 0,
                avgScore: 0,
                bestScore: 0,
                totalTime: 0
            };
            
            stats.totalExams++;
            stats.avgScore = Math.round(((stats.avgScore * (stats.totalExams - 1)) + score) / stats.totalExams);
            stats.bestScore = Math.max(stats.bestScore, score);
            stats.totalTime += Math.round(examConfig.timeLimit / 60);
            
            localStorage.setItem('userStats', JSON.stringify(stats));
            
            window.location.href = 'results.html';
        }

        function openCalculator() {
            const result = prompt('Simple Calculator\n\nEnter your calculation (e.g., 2+2, 10*5, 100/4):');
            if (result) {
                try {
                    const answer = eval(result);
                    alert(`Result: ${answer}`);
                } catch (e) {
                    alert('Invalid calculation!');
                }
            }
        }

        displayQuestion();
        updateQuestionGrid();
        startTimer();

        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = 'Are you sure you want to leave? Your exam progress will be lost.';
        });
    </script>
</body>
</html>
